[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"

# Redirect all requests to Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API routes configuration
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Function configuration for extended Gemini processing like working Netlify app
[functions]
  external_node_modules = ["@google/generative-ai"]
  node_bundler = "esbuild"
  
[[functions]]
  path = "src/app/api/brief"
  included_files = ["prompts/**/*"]

# Build configuration - Next.js handles function timeouts internally with extended Gemini timeouts
# Netlify serverless functions will use Next.js internal timeout handling
